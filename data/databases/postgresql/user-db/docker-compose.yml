version: '3.8'

services:
  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: titan_user
      POSTGRES_PASSWORD: titan_pass
    ports:
      - "5432:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan_user -d user_service"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  user_data: