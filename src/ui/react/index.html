<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/titan-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Titan Grove - Modern Enterprise Business Suite. Oracle EBS 12 competitor with integrated business applications for Fortune 100 companies." />
    <meta name="keywords" content="ERP, Enterprise Business Suite, Oracle EBS, Manufacturing, Finance, Supply Chain, HR Management" />
    <meta name="author" content="Titan Grove Team" />
    
    <title>Titan Grove - Enterprise Business Suite</title>
    
    <!-- IBM Plex Fonts for Carbon Design System -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <!-- Progressive Web App meta tags -->
    <meta name="theme-color" content="#0f62fe" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Titan Grove" />
    
    <!-- Open Graph meta tags -->
    <meta property="og:title" content="Titan Grove - Enterprise Business Suite" />
    <meta property="og:description" content="Modern Oracle EBS 12 competitor with comprehensive business management solutions" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Performance optimization -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    
    <style>
        /* Critical CSS for initial render */
        html, body, #root {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: #f4f4f4;
            color: #161616;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #root {
            display: flex;
            flex-direction: column;
        }
        
        /* Loading spinner for initial app load */
        .app-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 1rem;
        }
        
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e5e5;
            border-top: 3px solid #0f62fe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            font-size: 1.125rem;
            color: #525252;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Hide loading once React app loads */
        #root:not(:empty) ~ .app-loading {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="app-loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading Titan Grove...</div>
        </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
