              next_scheduled: "Second Sunday of each month"
              participants: ["Development Team", "Operations Team"]
              
          quarterly_tests:
            - name: "Complete Site Failover"
              frequency: "quarterly"
              duration: "4 hours"
              next_scheduled: "Last Sunday of quarter"
              participants: ["All Teams", "Business Stakeholders"]
              
            - name: "Security Incident Response"
              frequency: "quarterly"
              duration: "3 hours"
              next_scheduled: "Mid-quarter Sunday"
              participants: ["Security Team", "Operations Team", "Management"]
              
          annual_tests:
            - name: "Business Continuity Exercise"
              frequency: "annually"
              duration: "8 hours"
              next_scheduled: "Annual planning week"
              participants: ["All Staff", "Key Customers", "Vendors"]
              
            - name: "Regional Disaster Simulation"
              frequency: "annually" 
              duration: "12 hours"
              next_scheduled: "Disaster preparedness week"
              participants: ["All Teams", "Executive Leadership"]
        EOF

        echo "📋 DR Testing Schedule Created:"
        echo "============================"
        echo "✅ Monthly backup and failover tests"
        echo "✅ Quarterly comprehensive exercises"
        echo "✅ Annual business continuity validation"
        echo "✅ Multi-stakeholder participation"

  # === DR SUMMARY & REPORTING ===
  dr-summary:
