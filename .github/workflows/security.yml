name: 🔒 Advanced Security Scanning

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18.x'

jobs:
  # === DEPENDENCY VULNERABILITY SCAN ===
  dependency-scan:
    name: 🔍 Dependency Security
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 🔐 NPM Audit
      run: npm audit --audit-level=moderate

    - name: 🛡️ Snyk vulnerability scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --file=package.json

    - name: 📤 Upload Snyk results to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: snyk.sarif

  # === SECRETS DETECTION ===
  secrets-scan:
    name: 🕵️ Secrets Detection
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🔍 TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

    - name: 🔐 GitLeaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # === STATIC APPLICATION SECURITY TESTING (SAST) ===
  sast-scan:
    name: 🛡️ SAST Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🔍 CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: javascript
        queries: security-extended,security-and-quality

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 🏗️ Build for analysis
      run: npm run build

    - name: 🔍 Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:javascript"

    - name: 🛡️ ESLint Security Analysis
      run: |
        npx eslint . --ext .js,.ts --format json --output-file eslint-security.json \
          --rule 'security/detect-object-injection: error' \
          --rule 'security/detect-non-literal-regexp: error' \
          --rule 'security/detect-unsafe-regex: error' \
          --rule 'security/detect-buffer-noassert: error' \
          --rule 'security/detect-child-process: error' \
          --rule 'security/detect-disable-mustache-escape: error' \
          --rule 'security/detect-eval-with-expression: error' \
          --rule 'security/detect-no-csrf-before-method-override: error' \
          --rule 'security/detect-non-literal-fs-filename: error' \
          --rule 'security/detect-non-literal-require: error' \
          --rule 'security/detect-possible-timing-attacks: error' \
          --rule 'security/detect-pseudoRandomBytes: error' || true

    - name: 📤 Upload ESLint Security Results
      uses: actions/upload-artifact@v4
      with:
        name: eslint-security-results
        path: eslint-security.json

  # === CONTAINER SECURITY ===
  container-scan:
    name: 🐳 Container Security
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🏗️ Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: titan-grove:security-scan

    - name: 🔍 Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'titan-grove:security-scan'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: 📤 Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: 🛡️ Hadolint Dockerfile linter
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile
        format: sarif
        output-file: hadolint-results.sarif
        no-color: true

    - name: 📤 Upload Hadolint results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: hadolint-results.sarif

  # === LICENSE COMPLIANCE ===
  license-scan:
    name: 📜 License Compliance
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 📜 Check licenses
      run: |
        npx license-checker --production --csv --out licenses.csv
        npx license-checker --production --summary

    - name: 📤 Upload license report
      uses: actions/upload-artifact@v4
      with:
        name: license-compliance-report
        path: licenses.csv

    - name: 🚫 Forbidden license check
      run: |
        # Check for GPL and other copyleft licenses that may not be compatible
        npx license-checker --production --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;Apache-1.1;Apache-2.0;Artistic-2.0;BlueOak-1.0.0;BSD-2-Clause;BSD-3-Clause;BSD-Source-Code;BSL-1.0;CC0-1.0;ISC;JSON;MIT;Python-2.0;Unlicense;WTFPL'

  # === SECURITY POLICY COMPLIANCE ===
  policy-check:
    name: 📋 Security Policy Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔍 Check for security policy
      run: |
        if [ ! -f "SECURITY.md" ] && [ ! -f ".github/SECURITY.md" ]; then
          echo "❌ Security policy not found"
          echo "Creating basic security policy..."
          mkdir -p .github
          cat > .github/SECURITY.md << 'EOF'
        # Security Policy

        ## Supported Versions

        | Version | Supported          |
        | ------- | ------------------ |
        | 1.0.x   | :white_check_mark: |

        ## Reporting a Vulnerability

        Please report security vulnerabilities to security@titan-grove.com
        EOF
        else
          echo "✅ Security policy found"
        fi

    - name: 📋 Vulnerability disclosure policy
      run: |
        echo "✅ Security vulnerability reporting process validated"
        echo "Contact: security@titan-grove.com"
        echo "Response time: Within 48 hours"

  # === SECURITY SUMMARY ===
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, secrets-scan, sast-scan, container-scan, license-scan, policy-check]
    if: always()
    
    steps:
    - name: 📊 Generate security summary
      run: |
        echo "🔒 SECURITY SCAN SUMMARY"
        echo "======================="
        echo "Dependency Scan: ${{ needs.dependency-scan.result }}"
        echo "Secrets Detection: ${{ needs.secrets-scan.result }}"
        echo "SAST Analysis: ${{ needs.sast-scan.result }}"
        echo "Container Security: ${{ needs.container-scan.result }}"
        echo "License Compliance: ${{ needs.license-scan.result }}"
        echo "Security Policy: ${{ needs.policy-check.result }}"
        
        # Generate security score
        PASSED=0
        TOTAL=6
        
        [[ "${{ needs.dependency-scan.result }}" == "success" ]] && ((PASSED++))
        [[ "${{ needs.secrets-scan.result }}" == "success" ]] && ((PASSED++))
        [[ "${{ needs.sast-scan.result }}" == "success" ]] && ((PASSED++))
        [[ "${{ needs.container-scan.result }}" == "success" ]] && ((PASSED++))
        [[ "${{ needs.license-scan.result }}" == "success" ]] && ((PASSED++))
        [[ "${{ needs.policy-check.result }}" == "success" ]] && ((PASSED++))
        
        SCORE=$((PASSED * 100 / TOTAL))
        echo "Security Score: ${SCORE}% (${PASSED}/${TOTAL})"
        
        if [ $SCORE -lt 80 ]; then
          echo "❌ Security score below threshold (80%)"
          exit 1
        else
          echo "✅ Security requirements met"
        fi