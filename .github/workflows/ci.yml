name: 🚀 Continuous Integration

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  NODE_VERSION: '18.x'
  CACHE_KEY_PREFIX: ci-v1

jobs:
  # === CORE BUILD & TEST ===
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 📦 Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 🧪 Run tests
      run: npm test -- --coverage --passWithNoTests
      env:
        CI: true

    - name: 🏗️ Build application
      run: npm run build

    - name: 📊 Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.node-version == '18.x'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  # === LINT & FORMAT ===
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 🎨 Check formatting
      run: npm run format:check

    - name: 🔍 Run linter
      run: npm run lint:check

    - name: 📝 TypeScript check
      run: npx tsc --noEmit

  # === SECURITY SCANNING ===
  security:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 🔐 Run security audit
      run: npm run security:audit

    - name: 🕵️ Run Semgrep SAST
      uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/nodejs
          p/typescript
        generateSarif: "1"

    - name: 📤 Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: semgrep.sarif
      if: always()

  # === DOCKER BUILD ===
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🏗️ Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: false
        tags: titan-grove:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # === PERFORMANCE BASELINE ===
  performance:
    name: ⚡ Performance Benchmark
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 🏗️ Build application
      run: npm run build

    - name: ⚡ Run benchmarks
      run: npm run benchmark 2>&1 | tee benchmark-results.txt || echo "Benchmark completed"

    - name: 📊 Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ github.sha }}
        path: benchmark-results.txt

  # === NOTIFICATION ===
  notify:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, security, docker]
    if: always()
    
    steps:
    - name: ✅ Success notification
      if: ${{ needs.build-and-test.result == 'success' && needs.code-quality.result == 'success' && needs.security.result == 'success' && needs.docker.result == 'success' }}
      run: |
        echo "🎉 All CI checks passed successfully!"
        echo "Build: ${{ needs.build-and-test.result }}"
        echo "Quality: ${{ needs.code-quality.result }}"
        echo "Security: ${{ needs.security.result }}"
        echo "Docker: ${{ needs.docker.result }}"

    - name: ❌ Failure notification
      if: ${{ needs.build-and-test.result == 'failure' || needs.code-quality.result == 'failure' || needs.security.result == 'failure' || needs.docker.result == 'failure' }}
      run: |
        echo "💥 CI pipeline failed!"
        echo "Build: ${{ needs.build-and-test.result }}"
        echo "Quality: ${{ needs.code-quality.result }}"
        echo "Security: ${{ needs.security.result }}"
        echo "Docker: ${{ needs.docker.result }}"
        exit 1